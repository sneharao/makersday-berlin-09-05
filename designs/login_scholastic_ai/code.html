<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scholastic AI - Login</title>
<!-- Google Fonts: Hanken Grotesk -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#41484a",
                        "primary-container": "#0a373f",
                        "on-secondary-fixed": "#001f24",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#302dbe",
                        "on-primary-fixed-variant": "#244c55",
                        "tertiary-container": "#1302ab",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#c1c1ff",
                        "inverse-surface": "#2f3131",
                        "error-container": "#ffdad6",
                        "surface-dim": "#dadada",
                        "surface": "#f9f9f9",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed": "#e1dfff",
                        "secondary-fixed": "#afedfa",
                        "background": "#f9f9f9",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e2e2e3",
                        "surface-tint": "#3d646d",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#8b8eff",
                        "on-secondary-fixed-variant": "#004e59",
                        "on-primary-fixed": "#001f25",
                        "tertiary": "#08006f",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#93d0dd",
                        "primary": "#002127",
                        "surface-variant": "#e2e2e3",
                        "outline-variant": "#c0c8ca",
                        "outline": "#71787a",
                        "on-surface": "#1a1c1c",
                        "surface-container-high": "#e8e8e8",
                        "secondary": "#256772",
                        "secondary-container": "#aceaf7",
                        "on-primary-container": "#79a0aa",
                        "on-tertiary-fixed": "#08006c",
                        "on-secondary-container": "#2b6b76",
                        "inverse-primary": "#a5cdd7",
                        "primary-fixed": "#c0e9f4",
                        "on-background": "#1a1c1c",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-container-low": "#f3f3f4",
                        "primary-fixed-dim": "#a5cdd7",
                        "surface-container": "#eeeeee"
                    },
                    "borderRadius": {
                        "DEFAULT": "8px",
                        "lg": "8px",
                        "xl": "8px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "lg": "48px",
                        "xl": "64px",
                        "sm": "12px",
                        "gutter": "24px",
                        "container-max": "1440px",
                        "base": "8px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "display-lg": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "label-caps": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"],
                        "title-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "headline-md": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "title-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background flex items-center justify-center min-h-screen p-gutter antialiased">
<!-- Login Card Container -->
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-lg border border-outline-variant shadow-[0px_4px_20px_rgba(0,33,39,0.08)] overflow-hidden">
<div class="p-xl flex flex-col gap-lg">
<!-- Header / Brand -->
<div class="flex flex-col items-center text-center gap-sm">
<div class="w-16 h-16 rounded-lg bg-primary flex items-center justify-center text-on-primary mb-xs">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
</div>
<h1 class="text-headline-md font-headline-md text-on-background m-0">Scholastic AI</h1>
<p class="text-body-md font-body-md text-on-surface-variant m-0">Sign in to access your digital library.</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="text-label-caps font-label-caps text-on-surface" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-sm pr-sm pl-xl text-body-md font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-4 focus:ring-secondary/10 transition-all" id="email" name="email" placeholder="name@institution.edu" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-baseline">
<label class="text-label-caps font-label-caps text-on-surface" for="password">Password</label>
<a class="text-body-sm font-body-sm text-secondary font-semibold hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-sm pr-sm pl-xl text-body-md font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-secondary focus:ring-4 focus:ring-secondary/10 transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-base">
<button class="w-full bg-primary text-on-primary text-title-sm font-title-sm rounded-lg py-sm px-md hover:bg-on-primary-fixed-variant transition-colors flex items-center justify-center gap-xs shadow-sm active:scale-[0.98]" type="button">
                        Sign In
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Links -->
<div class="text-center text-body-sm font-body-sm text-on-surface-variant pt-base border-t border-outline-variant/30">
                Don't have an account? <a class="text-primary font-semibold hover:text-secondary transition-colors" href="#">Request Access</a>
</div>
</div>
</main>
</body></html>
